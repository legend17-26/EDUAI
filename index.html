<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPath AI — Sign In / Sign Up</title>
  
  <!-- Correct Asset Paths for Root index.html -->
  <link rel="stylesheet" href="./frontend/assets/css/main.css">
  <link rel="stylesheet" href="./frontend/assets/css/layout.css">
  <link rel="stylesheet" href="./frontend/assets/css/components.css">
  <link rel="stylesheet" href="./frontend/assets/css/dashboard.css">
  
  <style>
    .auth-card {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: left;
      display: none;
    }
    .auth-card.active {
      display: block;
    }
    .tab-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      background: rgba(255, 255, 255, 0.03);
      padding: 4px;
      border-radius: 10px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    .tab-btn.active {
      background: #6366f1;
      color: #fff;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }
    .form-group input:focus {
      border-color: #6366f1;
    }
  </style>
</head>
<body class="auth-body">

  <div class="background-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <main class="auth-wrapper" style="max-width: 440px; padding: 40px 20px; margin: auto; min-height: 100vh; display: flex; flex-direction: column; justify-content: center;">
    
    <div style="text-align: center; margin-bottom: 24px;">
      <span class="badge badge-hero">EduPath AI</span>
      <h1 style="font-size: 2rem; margin-top: 8px; color: #fff;">Welcome</h1>
      <p style="color: #94a3b8; font-size: 0.9rem;">Access your universal education & career platform.</p>
    </div>

    <!-- Toggle Tabs -->
    <div class="tab-buttons">
      <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Sign In Form (Number & OTP) -->
    <div id="signin-card" class="auth-card active">
      <form onsubmit="handleSignIn(event)">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="signin-number" placeholder="Enter your mobile number" required>
        </div>
        <div class="form-group">
          <label>OTP Verification Code</label>
          <div style="display: flex; gap: 8px;">
            <input type="text" id="signin-otp" placeholder="Enter 6-digit OTP" maxlength="6" required>
            <button type="button" class="btn btn-secondary" onclick="sendOtp()" style="white-space: nowrap; padding: 0 14px; font-size: 0.85rem;">Get OTP</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 12px;">Sign In</button>
      </form>
    </div>

    <!-- Sign Up Form (Email & Password) -->
    <div id="signup-card" class="auth-card">
      <form onsubmit="handleSignUp(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="signup-email" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 12px;">Create Account</button>
      </form>
    </div>

  </main>

  <script>
    function switchTab(tab) {
      const signinCard = document.getElementById('signin-card');
      const signupCard = document.getElementById('signup-card');
      const buttons = document.querySelectorAll('.tab-btn');

      buttons.forEach(btn => btn.classList.remove('active'));

      if (tab === 'signin') {
        signinCard.classList.add('active');
        signupCard.classList.remove('active');
        buttons[0].classList.add('active');
      } else {
        signupCard.classList.add('active');
        signinCard.classList.remove('active');
        buttons[1].classList.add('active');
      }
    }

    function sendOtp() {
      const number = document.getElementById('signin-number').value;
      if (!number || number.length < 10) {
        alert('Please enter a valid phone number first.');
        return;
      }
      alert('OTP sent successfully to ' + number);
    }

    function handleSignIn(e) {
      e.preventDefault();
      alert('Signed in successfully via OTP!');
      window.location.href = './frontend/pages/dashboard.html';
    }

    function handleSignUp(e) {
      e.preventDefault();
      alert('Account created successfully!');
      window.location.href = './frontend/pages/roadmap.html';
    }
  </script>

  <!-- Connected JavaScript Files from frontend folder -->
  <script src="./frontend/js/roadmap-data.js"></script>
  <script src="./frontend/js/api.js"></script>
  <script src="./frontend/js/auth.js"></script>
  <script src="./frontend/js/app.js"></script>
</body>
</html>
