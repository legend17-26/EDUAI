<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduPath AI — Forgot Password</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="auth-body">

  <div class="background-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <main class="auth-wrapper" style="max-width: 460px; margin: 0 auto;">
    <div class="auth-card">
      <div class="form-header" style="text-align: center;">
        <div class="brand-logo" style="margin: 0 auto 16px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
        <h2>Reset Password</h2>
        <p>Enter your email and we'll send a password recovery link.</p>
      </div>

      <form id="forgotForm" novalidate style="margin-top: 20px;">
        <div class="input-group">
          <div class="input-field">
            <input type="email" id="forgotEmail" placeholder=" " required />
            <label for="forgotEmail">Email Address</label>
          </div>
          <span class="error-msg" id="forgotEmailError"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 10px;">
          <span class="btn-text">Send Reset Link</span>
        </button>

        <div style="text-align: center; margin-top: 16px;">
          <a href="login.html" class="forgot-link" style="font-size: 0.85rem;">&larr; Back to Sign In</a>
        </div>
      </form>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <script src="../js/auth.js"></script>
</body>
</html>
