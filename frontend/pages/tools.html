<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPath AI — AI Assistant</title>
  
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">

  <style>
    body {
      background-color: #0b0f19;
      color: #fff;
      font-family: inherit;
      margin: 0;
      padding: 20px;
    }
    .assistant-wrapper {
      max-width: 900px;
      margin: 30px auto;
      height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .header-row h1 {
      font-size: 1.8rem;
      margin: 0;
    }
    .ai-assistant-card {
      flex: 1;
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }
    .assistant-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-weight: 600;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.02);
    }
    .ai-messages-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .chat-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .bubble-ai {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .bubble-user {
      background: #6366f1;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .ai-input-wrapper {
      padding: 16px;
      background: rgba(255, 255, 255, 0.02);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      gap: 10px;
    }
    .ai-input-wrapper input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }
    .ai-input-wrapper input:focus {
      border-color: #6366f1;
    }
    .ai-input-wrapper button {
      padding: 0 20px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="assistant-wrapper">
    <div class="header-row">
      <h1>AI Assistant</h1>
    </div>

    <div class="ai-assistant-card">
      <div class="assistant-card-header">Gemini Knowledge Engine</div>
      <div id="aiMessages" class="ai-messages-container">
        <div class="chat-bubble bubble-ai">
          Hello! I am your EduPath Gemini Assistant. Ask me anything about the website, courses, roadmaps, or resources!
        </div>
      </div>
      <div class="ai-input-wrapper">
        <input type="text" id="aiInput" placeholder="Ask Gemini..." autocomplete="off">
        <button id="aiSendBtn">Send</button>
      </div>
    </div>
  </div>

  <script src="../js/roadmap-data.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const inputField = document.getElementById('aiInput');
      const sendBtn = document.getElementById('aiSendBtn');
      const messagesContainer = document.getElementById('aiMessages');

      const websiteKnowledgeBase = [
        {
          keywords: ['about website', 'what is edupath', 'tell me about your website', 'platform'],
          response: "EduPath AI is your universal education & career platform featuring structured career roadmaps, domain learning paths, tailored academic courses, examination question guides, and productivity modules."
        },
        {
          keywords: ['roadmap', 'career path', 'domain'],
          response: "Our website offers interactive career roadmaps and domain paths designed to guide you step-by-step through engineering and technical disciplines."
        },
        {
          keywords: ['course', 'subject', 'module', 'syllabus', 'exam', 'notes'],
          response: "Inside our courses section, you will find module-specific study materials and practice questions structured for standard university exam formats (5-mark, 7-mark, and 10-mark structures)."
        }
      ];

      function handleUserQuery() {
        const query = inputField.value.trim();
        if (!query) return;

        appendBubble(query, 'bubble-user');
        inputField.value = '';
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        setTimeout(() => {
          const lowerQuery = query.toLowerCase();
          let matchedResponse = "EduPath AI provides complete support for your academic tracking, roadmaps, courses, and resource exploration. Feel free to ask about any specific section!";

          for (const item of websiteKnowledgeBase) {
            if (item.keywords.some(kw => lowerQuery.includes(kw))) {
              matchedResponse = item.response;
              break;
            }
          }

          appendBubble(matchedResponse, 'bubble-ai');
          messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 200);
      }

      function appendBubble(text, className) {
        const bubble = document.createElement('div');
        bubble.className = `chat-bubble ${className}`;
        bubble.textContent = text;
        messagesContainer.appendChild(bubble);
      }

      sendBtn.addEventListener('click', handleUserQuery);
      inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleUserQuery();
      });
    });
  </script>
</body>
</html>
