<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduPath AI - Student Dashboard</title>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <link rel="stylesheet" href="../assets/css/layout.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
  <link rel="stylesheet" href="../assets/css/dashboard.css"/>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <a href="index.html" class="brand-logo" style="margin-bottom: 2rem;">EduPath AI</a>
      <div class="sidebar-menu">
        <a href="#" class="sidebar-item active">Dashboard</a>
        <a href="roadmap.html" class="sidebar-item">Roadmaps</a>
        <a href="tools.html" class="sidebar-item">Tools & AI</a>
      </div>
    </aside>

    <main class="dashboard-main">
      <h2>Welcome Back, Student 👋</h2>
      <div class="grid grid-cols-3 gap-md" style="margin: 2rem 0;">
        <div class="card-glass stat-card">
          <div>
            <div style="color: var(--text-muted);">Study Streak</div>
            <div class="stat-value">12 Days</div>
          </div>
        </div>
        <div class="card-glass stat-card">
          <div>
            <div style="color: var(--text-muted);">Skills Completed</div>
            <div class="stat-value">34</div>
          </div>
        </div>
        <div class="card-glass stat-card">
          <div>
            <div style="color: var(--text-muted);">Active Roadmaps</div>
            <div class="stat-value">2</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
