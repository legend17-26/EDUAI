<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduPath AI — Sign In</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="auth-body">

  <div class="background-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>

  <main class="auth-wrapper">
    <div class="auth-container">

      <!-- LEFT SIDE: Hero Section -->
      <section class="auth-hero">
        <div class="brand-header">
          <div class="brand-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <span class="brand-name">EduPath AI</span>
        </div>

        <div class="hero-content">
          <span class="badge badge-hero">Welcome Back</span>
          <h1 class="hero-title">Continue Your Learning Journey</h1>
          <p class="hero-description">Access your AI roadmaps, exam prep guides, and saved achievements.</p>
        </div>

        <div class="hero-footer">
          <p>&copy; 2026 EduPath AI. All rights reserved.</p>
        </div>
      </section>

      <!-- RIGHT SIDE: Glass Card -->
      <section class="auth-card-wrapper">
        <div class="auth-card">

          <div class="auth-tabs" role="tablist">
            <a href="login.html" class="tab-btn active">Sign In</a>
            <a href="signup.html" class="tab-btn">Sign Up</a>
          </div>

          <form id="signInForm" class="auth-form active" novalidate>
            <div class="form-header">
              <h2>Welcome Back</h2>
              <p>Enter your phone number and password.</p>
            </div>

            <div class="input-group">
              <div class="input-field">
                <input type="tel" id="loginPhone" placeholder=" " required />
                <label for="loginPhone">Phone Number</label>
              </div>
              <span class="error-msg" id="loginPhoneError"></span>
            </div>

            <div class="input-group">
              <div class="input-field">
                <input type="password" id="loginPassword" placeholder=" " required />
                <label for="loginPassword">Password</label>
                <button type="button" class="toggle-password" aria-label="Toggle password">
                  <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span class="error-msg" id="loginPasswordError"></span>
            </div>

            <div class="form-options">
              <label class="custom-checkbox">
                <input type="checkbox" id="rememberMe" />
                <span class="checkmark"></span>
                <span class="label-text">Remember Me</span>
              </label>
              <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
              <span class="btn-text">Login</span>
            </button>
          </form>

        </div>
      </section>

    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <script src="../js/auth.js"></script>
</body>
</html>
