<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduPath AI - Authenticate</title>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <link rel="stylesheet" href="../assets/css/layout.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
  <div class="card-glass" style="width: 100%; max-width: 420px;">
    <h2 style="text-align: center; margin-bottom: 1.5rem;">Welcome to EduPath AI</h2>
    <form id="authForm" class="flex flex-col gap-md">
      <div>
        <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-muted);">Email Address</label>
        <input type="email" required class="search-input" style="padding: 0.75rem 1rem;" placeholder="name@example.com"/>
      </div>
      <div>
        <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-muted);">Password</label>
        <input type="password" required class="search-input" style="padding: 0.75rem 1rem;" placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Continue</button>
    </form>
  </div>
</body>
</html>
